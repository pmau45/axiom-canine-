[build]
  # No build command needed since this is a static HTML file
  publish = "."
  
[[redirects]]
  # Allow the thank-you page to be served directly
  from = "/thank-you.html"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  # SPA fallback - redirect all routes to Main (your index file)
  from = "/*"
  to = "/Main"
  status = 200

# Optional: Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
[[headers]]
  for = "/Main"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

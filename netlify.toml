[build]
  # No build command needed since this is a static HTML file
  publish = "."
  
[[redirects]]
  # Redirect /thank-you (no extension) to the thank-you page (used by form action)
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  # SPA fallback - redirect all routes to Main (your index file)
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
